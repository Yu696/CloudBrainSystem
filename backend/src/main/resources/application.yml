server:
  port: 8080

spring:
  application:
    name: cloudbrain-platform

  # MySQL 数据源
  datasource:
    url: jdbc:mysql://192.168.110.128:3306/cloudbrain?serverTimezone=Asia/Shanghai
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis
  data:
    redis:
      host: 192.168.110.128
      port: 6379
      password: redis123456
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Jackson 序列化
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.cloudbrain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT 配置
jwt:
  secret: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZw==
  expiration: 86400000    # 24小时 (毫秒)

# K8: 通用 API 限流配置
app:
  rate-limit:
    enabled: true
    max-per-minute: 60

# Knife4j API 文档
knife4j:
  enable: true
  setting:
    language: zh_cn

# AI 服务配置
ai:
  provider: deepseek
  api-key: ${AI_API_KEY}
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
  timeout: 30000
  connect-timeout: 3000
  fallback:
    enabled: true
  retry:
    max-attempts: 2
  rate-limit:
    enabled: true
    max-per-minute: 10
    max-per-day: 100
  vision:
    api-key: ark-5e783fde-f569-4b18-aac4-e82e7771a028-59537
    api-url: https://ark.cn-beijing.volces.com/api/v3/chat/completions
    model: ep-20260629234720-b6dtg
    timeout: 60000
  mock:
    enabled: ${AI_MOCK_ENABLED:false}

# M05 文件存储配置
storage:
  type: minio
  base-path: ./data/cloudbrain/images
  minio:
    endpoint: http://192.168.110.128:9000
    access-key: minioadmin
    secret-key: minioadmin123
    bucket: cloudbrain-images
  max-file-size: 50MB
  allowed-types:
    - dicom
    - dcm
    - jpg
    - jpeg
    - png
